name: meditation_app
description: A meditation app with artist-created content
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.9
  supabase_flutter: ^2.3.2
  file_picker: ^6.1.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.1.0
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  path: ^1.8.3
  http: ^1.3.0
  supabase: ^2.6.3
  dotenv: ^4.2.0
  cached_network_image: ^3.3.1
  app_links: ^3.5.0
  lottie: ^3.0.0
  table_calendar: ^3.0.9
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/
    - .env

  fonts:
    - family: Mourier
      fonts:
        - asset: assets/fonts/Mourier-Regular.otf