name: meditation_app
description: "A modern Flutter application for mindfulness and meditation."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  just_audio_background: ^0.0.1-beta.11
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  logger: ^2.0.2+1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.2
  connectivity_plus: ^5.0.2
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_dotenv: ^5.2.1
  app_links: ^3.5.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.0
  flutter_lints: ^2.0.0
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.10
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/
    - .env

  fonts:
    - family: Mourier
      fonts:
        - asset: assets/fonts/Mourier-Regular.otf